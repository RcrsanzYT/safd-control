<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Centro de Control SAFD</title>
<link rel="stylesheet" href="style.css">
<style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #login, #panel { max-width: 600px; margin: auto; }
    input { display: block; margin: 10px 0; padding: 8px; width: 100%; }
    button { padding: 8px 16px; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #000; padding: 6px; text-align: center; }
    .panel { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
    .card { border: 1px solid #000; padding: 10px; flex: 1 1 150px; text-align: center; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Iniciar sesión</h2>
    <input type="text" id="nombreUsuario" placeholder="Usuario">
    <input type="password" id="claveUsuario" placeholder="Contraseña">
    <button onclick="iniciarSesion()">Entrar</button>
</div>

<!-- PANEL PRINCIPAL -->
<div id="panel" style="display:none;">
    <h1>CENTRO DE CONTROL SAFD</h1>
    <p>Usuario activo: <span id="usuarioActivo"></span> 
        <button onclick="cerrarSesion()">Cerrar sesión</button>
    </p>

    <div class="panel">
        <div class="card">
            <h3>Fecha</h3>
            <p id="fecha"></p>
        </div>

        <div class="card">
            <h3>Hora entrada</h3>
            <p id="entrada">--:--:--</p>
        </div>

        <div class="card">
            <h3>Hora salida</h3>
            <p id="salida">--:--:--</p>
        </div>

        <div class="card">
            <h3>Duración turno</h3>
            <p id="duracion">00:00:00</p>
        </div>

        <div class="card">
            <h3>Horas hoy</h3>
            <p id="horasHoy">00:00:00</p>
        </div>

        <div class="card">
            <h3>Horas semana</h3>
            <p id="horasSemana">00:00:00</p>
        </div>
    </div>

    <button id="botonServicio" onclick="toggleServicio()">Iniciar servicio</button>

    <h2>Historial de turnos</h2>
    <table id="tablaTurnos" border="1">
        <tr>
            <th>Usuario</th>
            <th>Fecha</th>
            <th>Entrada</th>
            <th>Salida</th>
            <th>Duración</th>
        </tr>
    </table>
</div>

<!-- SCRIPT AL FINAL -->
<script src="script.js"></script>

</body>
</html>
